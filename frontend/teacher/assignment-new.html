<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новое задание</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon/favicon.svg">
    <link rel="icon" type="image/x-icon" href="/static/favicon/favicon.ico">
    <link rel="apple-touch-icon" href="/static/favicon/apple-touch-icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/student/css/dashboard.css">
    <link rel="stylesheet" href="/static/teacher/css/teacher.css">
</head>
<body>
    <div class="bg">
        <img src="/static/student/images/fon.svg" alt="">
        <div class="bg-light-2b"></div>
    </div>

    <div class="layout">
        <button class="mobile-nav-toggle" type="button" aria-label="Открыть меню" aria-expanded="false" data-mobile-nav-toggle>
            <span></span>
            <span></span>
            <span></span>
        </button>
        <div class="sidebar-overlay"></div>
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div class="sidebar-logo-text">
                    <span class="sidebar-logo-title">Вектор</span>
                    <span class="sidebar-logo-sub">Личный помощник с задачами</span>
                </div>
            </div>
            <div class="sidebar-divider"></div>
            <nav class="sidebar-nav">
                <a href="/teacher/dashboard" class="nav-item">
                    <img src="/static/student/images/home.svg" alt="">
                    <span class="nav-label">Главный экран</span>
                </a>
                <a href="/teacher/classes" class="nav-item">
                    <img src="/static/student/images/usp.svg" alt="">
                    <span class="nav-label">Мои классы</span>
                </a>
                <a href="/teacher/assignments" class="nav-item">
                    <img src="/static/student/images/task.svg" alt="">
                    <span class="nav-label">Задания</span>
                </a>
            </nav>
            <div class="sidebar-bottom">
                <a href="/teacher/settings" class="nav-item">
                    <img src="/static/student/images/settings.svg" alt="">
                    <span class="nav-label">Настройки</span>
                </a>
            </div>
        </aside>

        <div class="main-wrap">
            <main class="main teacher-main">
                <div class="teacher-page-toolbar">
                    <div>
                        <div class="teacher-title">Новое задание</div>
                        <div class="teacher-subtitle">Название, предмет, дедлайн, приоритет и назначение для всего класса или выбранных учеников.</div>
                    </div>
                </div>

                <section class="teacher-card">
                    <form id="assignmentForm" class="teacher-form">
                        <div class="teacher-form-grid">
                            <div class="teacher-field">
                                <span>Название</span>
                                <input id="titleInput" class="teacher-input" type="text" required>
                            </div>
                            <div class="teacher-field">
                                <span>Предмет</span>
                                <input id="subjectInput" class="teacher-input" type="text" required>
                            </div>
                            <div class="teacher-field wide">
                                <span>Описание</span>
                                <textarea id="descriptionInput" class="teacher-textarea"></textarea>
                            </div>
                            <div class="teacher-field">
                                <span>Дедлайн</span>
                                <input id="deadlineInput" class="teacher-input" type="datetime-local" required>
                            </div>
                            <div class="teacher-field">
                                <span>Приоритет</span>
                                <select id="priorityInput" class="teacher-select">
                                    <option value="low">Обычный</option>
                                    <option value="medium" selected>Средний</option>
                                    <option value="high">Высокий</option>
                                    <option value="critical">Критичный</option>
                                </select>
                            </div>
                            <div class="teacher-field">
                                <span>Класс</span>
                                <select id="classInput" class="teacher-select" required></select>
                            </div>
                            <div class="teacher-field">
                                <span>Кому назначить</span>
                                <select id="assignModeInput" class="teacher-select">
                                    <option value="all">Весь класс</option>
                                    <option value="selected">Конкретные ученики</option>
                                </select>
                            </div>
                            <div id="studentsField" class="teacher-field wide" style="display:none;">
                                <span>Выберите учеников</span>
                                <div id="studentsCheckboxes" class="teacher-checkbox-list"></div>
                            </div>
                        </div>
                        <div class="teacher-inline-actions">
                            <button type="submit" class="teacher-button primary">Опубликовать</button>
                            <button type="button" id="cancelBtn" class="teacher-button">Отмена</button>
                        </div>
                    </form>
                </section>
            </main>
        </div>
    </div>

    <script src="/static/js/mobile-nav.js"></script>
    <script src="/static/teacher/js/common.js"></script>
    <script src="/static/teacher/js/assignment-new.js"></script>
</body>
</html>
