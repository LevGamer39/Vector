<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дашборд учителя</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon/favicon.svg">
    <link rel="icon" type="image/x-icon" href="/static/favicon/favicon.ico">
    <link rel="apple-touch-icon" href="/static/favicon/apple-touch-icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/student/css/dashboard.css">
    <link rel="stylesheet" href="/static/teacher/css/teacher.css">
</head>
<body>
    <div class="bg">
        <img src="/static/student/images/fon.svg" alt="">
        <div class="bg-light-2b"></div>
    </div>

    <div class="layout">
        <button class="mobile-nav-toggle" type="button" aria-label="Открыть меню" aria-expanded="false" data-mobile-nav-toggle>
            <span></span>
            <span></span>
            <span></span>
        </button>
        <div class="sidebar-overlay"></div>
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div class="sidebar-logo-text">
                    <span class="sidebar-logo-title">Вектор</span>
                    <span class="sidebar-logo-sub">Личный помощник с задачами</span>
                </div>
            </div>
            <div class="sidebar-divider"></div>
            <nav class="sidebar-nav">
                <a href="/teacher/dashboard" class="nav-item">
                    <img src="/static/student/images/home.svg" alt="">
                    <span class="nav-label">Главный экран</span>
                </a>
                <a href="/teacher/classes" class="nav-item">
                    <img src="/static/student/images/usp.svg" alt="">
                    <span class="nav-label">Мои классы</span>
                </a>
                <a href="/teacher/assignments" class="nav-item">
                    <img src="/static/student/images/task.svg" alt="">
                    <span class="nav-label">Задания</span>
                </a>
            </nav>
            <div class="sidebar-bottom">
                <a href="/teacher/settings" class="nav-item">
                    <img src="/static/student/images/settings.svg" alt="">
                    <span class="nav-label">Настройки</span>
                </a>
            </div>
        </aside>

        <div class="main-wrap">
            <main class="main teacher-main">
                <div class="teacher-topbar">
                    <div class="teacher-topbar-left">
                        <div class="teacher-title">Мои классы:</div>
                        <div id="classSwitcher" class="class-switcher"></div>
                    </div>
                    <div class="topbar-right">
                        <div class="notif-wrap" onclick="toggleNotifications(event)">
                            <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                                <path d="M14 3C14 3 7 6 7 14v5l-2 2v1h18v-1l-2-2v-5c0-8-7-11-7-11z" stroke="rgba(255,255,255,0.6)" stroke-width="1.8" stroke-linejoin="round"/>
                                <path d="M11.5 23a2.5 2.5 0 0 0 5 0" stroke="rgba(255,255,255,0.6)" stroke-width="1.8"/>
                            </svg>
                            <div id="notifCounter" class="notif-dot" style="display:none;">0</div>
                            <div id="notifModal" class="notif-modal" style="display:none;">
                                <h2 class="notif-title">Уведомления</h2>
                                <div class="notif-scroll-area" id="notifList"></div>
                            </div>
                        </div>
                        <div class="avatar">VT</div>
                    </div>
                </div>

                <div class="teacher-grid">
                    <section class="teacher-column">
                        <div class="teacher-card compact">
                            <div class="teacher-filter-group">
                                <div class="teacher-filter-label">Предмет</div>
                                <select id="subjectSelect" class="teacher-select"></select>
                            </div>
                            <div class="teacher-filter-group">
                                <div class="teacher-filter-label">Выбранное задание</div>
                                <select id="assignmentSelect" class="teacher-select"></select>
                            </div>
                        </div>

                        <div class="teacher-card teacher-table">
                            <div class="teacher-table-head">
                                <div>#</div>
                                <div>Ученик</div>
                                <div>Прогресс</div>
                                <div>Баллы</div>
                                <div>Оценка</div>
                            </div>
                            <div id="studentsTable" class="teacher-table-body"></div>
                            <div id="pagination" class="teacher-pagination"></div>
                        </div>
                    </section>

                    <aside class="teacher-column">
                        <div class="teacher-card">
                            <div class="teacher-card-title">Статистика</div>
                            <div class="teacher-stats">
                                <span>выполнили задание</span>
                                <strong id="completedCount">0</strong>
                                <span>начали выполнение</span>
                                <strong id="startedCount">0</strong>
                                <span>не приступали</span>
                                <strong id="pendingCount">0</strong>
                            </div>
                        </div>

                        <div class="teacher-card">
                            <div class="teacher-card-title">Действия</div>
                            <div class="teacher-actions">
                                <button id="copyLinkBtn" class="teacher-action">Копировать ссылку</button>
                                <button id="gradeBtn" class="teacher-action">Выставить отметки</button>
                            </div>
                        </div>

                        <div class="teacher-card">
                            <div class="teacher-card-title">Задания</div>
                            <div class="teacher-actions">
                                <button id="openAssignmentsBtn" class="teacher-action">Открыть список заданий</button>
                                <button id="createAssignmentBtn" class="teacher-action primary">Создать новое задание</button>
                            </div>
                        </div>
                    </aside>
                </div>
            </main>
        </div>
    </div>

    <div id="gradeModal" class="teacher-modal">
        <div class="teacher-modal-card">
            <div class="teacher-page-toolbar">
                <div class="teacher-card-title">Выставить отметки</div>
                <button id="closeGradeModalBtn" class="teacher-chip">Закрыть</button>
            </div>
            <div id="gradeModalBody" class="teacher-modal-grid"></div>
            <div class="teacher-inline-actions">
                <button id="saveGradesBtn" class="teacher-button primary">Сохранить отметки</button>
            </div>
        </div>
    </div>

    <script src="/static/js/mobile-nav.js"></script>
    <script src="/static/teacher/js/common.js"></script>
    <script src="/static/teacher/js/dashboard.js"></script>
</body>
</html>
