<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/static/favicon/favicon.svg">
    <link rel="icon" type="image/x-icon" href="/static/favicon/favicon.ico">
    <link rel="apple-touch-icon" href="/static/favicon/apple-touch-icon.png">
<title>Сменить почту</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Inter', sans-serif; background: #07001C; color: #fff; }
  .bg { position: fixed; inset: 0; background: #07001C; overflow: hidden; }
  .bg img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: .92; }
  .bg-light-2b {
    position: absolute; width: 114.6%; height: 62.63%; left: 45.57%; top: -80.99%;
    transform-origin: center center; transform: rotate(-132.01deg); filter: blur(204px); mix-blend-mode: lighten;
    background: radial-gradient(112.67% 112.67% at 41.02% 100%, rgba(255,255,255,0.651) 11.3%, rgba(208,201,250,0.539) 25.06%, rgba(101,77,253,0.539) 36.98%, rgba(36,0,255,0.539) 49.38%, rgba(12,0,84,0.614) 71.88%, rgba(2,0,15,0.7) 88.54%);
    opacity: .6;
  }
  .page { position: relative; z-index: 1; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card {
    width: min(860px, 92vw);
    background: rgba(255,255,255,0.14);
    box-shadow: inset 0 2px 4px rgba(255,255,255,0.16);
    backdrop-filter: blur(50px);
    -webkit-backdrop-filter: blur(50px);
    border-radius: 22px;
    padding: 64px 56px;
  }
  .title { font-size: clamp(32px, 4vw, 60px); font-weight: 800; line-height: .96; letter-spacing: -.05em; margin-bottom: 14px; text-align: center; }
  .subtitle { color: rgba(255,255,255,.7); font-size: 18px; text-align: center; margin-bottom: 34px; line-height: 1.45; }
  .msg { display: none; margin-bottom: 16px; padding: 12px 16px; border-radius: 12px; font-size: 14px; text-align: center; }
  .msg.error { background: rgba(220,38,38,.2); color: #fecaca; }
  .msg.success { background: rgba(16,185,129,.18); color: #bbf7d0; }
  .field { margin-bottom: 22px; }
  .field-label { display: block; font-size: 17px; font-weight: 600; margin-bottom: 10px; }
  .field-input {
    width: 100%; height: 54px; border-radius: 16px; border: 1px solid rgba(255,255,255,.8);
    background: transparent; padding: 0 18px; color: #fff; font-size: 17px; outline: none;
  }
  .field-input::placeholder { color: rgba(255,255,255,.5); }
  .field-input:focus { border-color: #999CFF; }
  .btn {
    width: 100%; height: 54px; border-radius: 16px; border: none; cursor: pointer;
    background: linear-gradient(135deg, #8B79FF, #6d5cff); color: #fff; font-size: 22px; font-weight: 700;
    box-shadow: 0 12px 24px rgba(109,92,255,.28);
  }
  .back-link { display: block; margin-top: 18px; text-align: center; color: #c7beff; text-decoration: none; font-size: 14px; }
</style>
</head>
<body>
<div class="bg">
  <img src="/static/student/images/fon.svg" alt="">
  <div class="bg-light-2b"></div>
</div>

<div class="page">
  <div class="card">
    <h1 class="title">Сменить почту</h1>
    <p class="subtitle">Введите новый email. Мы отправим ссылку для подтверждения на новый адрес.</p>
    <div class="msg" id="msg"></div>
    <div class="field">
      <label class="field-label" for="email">Новая электронная почта</label>
      <input class="field-input" type="email" id="email" placeholder="Введите новую почту">
    </div>
    <button class="btn" id="btn" type="button">Отправить письмо</button>
    <a class="back-link" href="/settings">Вернуться в настройки</a>
  </div>
</div>

<script>
const API = window.location.origin;
const TOKEN = localStorage.getItem('token');
if (!TOKEN) window.location.href = '/login';

document.getElementById('btn').addEventListener('click', async () => {
  const email = document.getElementById('email').value.trim();
  const btn = document.getElementById('btn');
  const msg = document.getElementById('msg');
  msg.style.display = 'none';

  if (!email) {
    msg.textContent = 'Введите новую почту';
    msg.className = 'msg error';
    msg.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Отправляю...';

  try {
    const res = await fetch(API + '/api/users/me/change-email', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${TOKEN}`,
      },
      body: JSON.stringify({ email }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Ошибка смены почты');

    msg.textContent = data.message || 'Письмо отправлено.';
    msg.className = 'msg success';
    msg.style.display = 'block';
    btn.textContent = 'Письмо отправлено';
  } catch (error) {
    msg.textContent = error.message || 'Ошибка. Попробуйте позже.';
    msg.className = 'msg error';
    msg.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Отправить письмо';
  }
});
</script>
</body>
</html>
