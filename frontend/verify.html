<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/static/favicon/favicon.svg">
    <link rel="icon" type="image/x-icon" href="/static/favicon/favicon.ico">
    <link rel="apple-touch-icon" href="/static/favicon/apple-touch-icon.png">
    <title>Подтвердите почту</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/verify.css">
</head>
<body>
    <div class="bg"><div class="bg-v2"></div><div class="bg-v3"></div></div>
    <div class="page">
        <div class="card">
            <h1 class="title">Подтвердите почту</h1>
            <p class="subtitle">Введите шестизначный код</p>
            <p class="email-hint" id="email-hint"></p>
            <div class="err-msg" id="err"></div>
            <div class="code-inputs">
                <input class="code-box" type="text" maxlength="1" inputmode="numeric">
                <input class="code-box" type="text" maxlength="1" inputmode="numeric">
                <input class="code-box" type="text" maxlength="1" inputmode="numeric">
                <input class="code-box" type="text" maxlength="1" inputmode="numeric">
                <input class="code-box" type="text" maxlength="1" inputmode="numeric">
                <input class="code-box" type="text" maxlength="1" inputmode="numeric">
            </div>
            <p class="resend">
                Не пришел код?
                <button class="resend-btn" id="resendBtn" disabled>
                    Повторить попытку через <span id="timer">60</span> сек
                </button>
            </p>
        </div>
    </div>
    <script>
        (async function () {
            const token = localStorage.getItem('token');
            if (!token) return;
            try {
                const res = await fetch(window.location.origin + '/api/users/me', {
                    headers: { Authorization: `Bearer ${token}` },
                });
                if (!res.ok) {
                    localStorage.removeItem('token');
                    return;
                }
                const user = await res.json();
                const next = user.role === 'teacher' ? '/teacher/dashboard' : user.role === 'parent' ? '/parent/dashboard' : '/student/dashboard';
                window.location.replace(next);
            } catch (_) {
                localStorage.removeItem('token');
            }
        })();
    </script>
    <script src="/static/js/verify.js"></script>
</body>
</html>
