<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/static/favicon/favicon.svg">
    <link rel="icon" type="image/x-icon" href="/static/favicon/favicon.ico">
    <link rel="apple-touch-icon" href="/static/favicon/apple-touch-icon.png">
<title>404 — EduPlanner</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/base.css">
<style>
  body { display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; }
  .wrap { max-width:420px; }
  .big { font-size:96px; font-weight:800; color:var(--accent); line-height:1; }
  h1 { font-size:24px; font-weight:800; margin:16px 0 8px; }
  p { color:var(--muted); margin-bottom:32px; }
  a { display:inline-block; background:var(--accent); color:#fff; padding:12px 28px; border-radius:8px; font-weight:700; }
</style>
</head>
<body>
<div class="wrap">
  <div class="big">404</div>
  <h1>Страница не найдена</h1>
  <p>Кажется, вы зашли не туда. Не страшно — вернёмся на главную.</p>
  <a href="index.html" id="home-link">На главную</a>
</div>
<script src="/static/js/api.js"></script>
<script>
  const user = getUser();
  if (user) {
    const link = document.getElementById('home-link');
    if (user.role === 'student') { link.href = 'student/dashboard.html'; link.textContent = 'На дашборд'; }
    if (user.role === 'teacher') { link.href = 'teacher/dashboard.html'; link.textContent = 'На дашборд'; }
    if (user.role === 'parent')  { link.href = 'parent/dashboard.html';  link.textContent = 'На дашборд'; }
  }
</script>
</body>
</html>
