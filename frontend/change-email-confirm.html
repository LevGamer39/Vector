<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/static/favicon/favicon.svg">
    <link rel="icon" type="image/x-icon" href="/static/favicon/favicon.ico">
    <link rel="apple-touch-icon" href="/static/favicon/apple-touch-icon.png">
<title>Подтверждение почты</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Inter', sans-serif; background: #07001C; color: #fff; }
  .bg { position: fixed; inset: 0; background: #07001C; overflow: hidden; }
  .bg img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: .92; }
  .bg-light-2b {
    position: absolute; width: 114.6%; height: 62.63%; left: 45.57%; top: -80.99%;
    transform-origin: center center; transform: rotate(-132.01deg); filter: blur(204px); mix-blend-mode: lighten;
    background: radial-gradient(112.67% 112.67% at 41.02% 100%, rgba(255,255,255,0.651) 11.3%, rgba(208,201,250,0.539) 25.06%, rgba(101,77,253,0.539) 36.98%, rgba(36,0,255,0.539) 49.38%, rgba(12,0,84,0.614) 71.88%, rgba(2,0,15,0.7) 88.54%);
    opacity: .6;
  }
  .page { position: relative; z-index: 1; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card {
    width: min(860px, 92vw);
    background: rgba(255,255,255,0.14);
    box-shadow: inset 0 2px 4px rgba(255,255,255,0.16);
    backdrop-filter: blur(50px);
    -webkit-backdrop-filter: blur(50px);
    border-radius: 22px;
    padding: 64px 56px;
    text-align: center;
  }
  .title { font-size: clamp(32px, 4vw, 60px); font-weight: 800; line-height: .96; letter-spacing: -.05em; margin-bottom: 16px; }
  .text { color: rgba(255,255,255,.76); font-size: 18px; line-height: 1.5; }
  .link { display: inline-block; margin-top: 20px; color: #c7beff; text-decoration: none; }
  @media (max-width: 768px) {
    html, body {
      height: auto;
      min-height: 100%;
      overflow: auto;
    }
    .page {
      min-height: 100svh;
      height: auto;
      padding: 20px 16px;
    }
    .card {
      width: min(100%, 560px);
      padding: 34px 20px 28px;
    }
    .text {
      font-size: 16px;
    }
  }
</style>
</head>
<body>
<div class="bg">
  <img src="/static/student/images/fon.svg" alt="">
  <div class="bg-light-2b"></div>
</div>

<div class="page">
  <div class="card">
    <h1 class="title" id="title">Подтверждаю...</h1>
    <p class="text" id="text">Пожалуйста, подождите.</p>
    <a class="link" href="/settings" id="link" style="display:none;">Вернуться в настройки</a>
  </div>
</div>

<script>
const API = window.location.origin;
const params = new URLSearchParams(window.location.search);
const token = params.get('token');

async function run() {
  const title = document.getElementById('title');
  const text = document.getElementById('text');
  const link = document.getElementById('link');

  if (!token) {
    title.textContent = 'Ссылка недействительна';
    text.textContent = 'Токен не найден.';
    link.style.display = 'inline-block';
    return;
  }

  try {
    const res = await fetch(API + '/api/users/me/change-email/confirm?token=' + encodeURIComponent(token), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Ошибка подтверждения');

    title.textContent = 'Почта изменена';
    text.textContent = `Новый email: ${data.email}`;
  } catch (error) {
    title.textContent = 'Не удалось подтвердить';
    text.textContent = error.message || 'Ссылка устарела или уже была использована.';
  }

  link.style.display = 'inline-block';
}

run();
</script>
</body>
</html>
