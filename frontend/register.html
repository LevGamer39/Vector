<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Зарегистрируйтесь</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon/favicon.svg">
    <link rel="icon" type="image/x-icon" href="/static/favicon/favicon.ico">
    <link rel="apple-touch-icon" href="/static/favicon/apple-touch-icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/register.css">
</head>
<body>
    <div class="bg"><div class="bg-v2"></div><div class="bg-v3"></div></div>
    <div class="page">
        <div class="card">
            <h1 class="title">Зарегистрируйтесь</h1>
            <p class="subtitle">Введите свои персональные данные для создания учетной записи</p>
            <div class="role-tabs">
                <button class="role-tab active" data-role="student">Ученик</button>
                <button class="role-tab" data-role="teacher">Учитель</button>
                <button class="role-tab" data-role="parent">Родитель</button>
            </div>
            <div class="error" id="err"></div>
            <div class="row">
                <div class="field">
                    <span class="field-label">Имя</span>
                    <input class="field-input" type="text" id="first_name" placeholder="Введите своё имя">
                </div>
                <div class="field">
                    <span class="field-label">Фамилия</span>
                    <input class="field-input" type="text" id="last_name" placeholder="Введите свою фамилию">
                </div>
            </div>
            <div class="field">
                <span class="field-label">Электронная почта</span>
                <input class="field-input" type="email" id="email" placeholder="Введите свою почту">
            </div>
            <div class="field">
                <span class="field-label">Пароль</span>
                <input class="field-input" type="password" id="password" placeholder="Минимум 8 символов">
            </div>
            <div class="invite-wrap" id="invite-wrap">
                <span class="field-label">Инвайт-код учителя</span>
                <input class="field-input" type="text" id="invite_code" placeholder="Получите код у администратора">
            </div>
            <button class="btn-register" id="btn">Зарегистрироваться</button>
            <p class="login-link">У вас уже есть аккаунт? <a href="login">Войдите в систему</a></p>
        </div>
    </div>
    <script>
        (async function () {
            const token = localStorage.getItem('token');
            if (!token) return;
            try {
                const res = await fetch(window.location.origin + '/api/users/me', {
                    headers: { Authorization: `Bearer ${token}` },
                });
                if (!res.ok) {
                    localStorage.removeItem('token');
                    return;
                }
                const user = await res.json();
                const next = user.role === 'teacher' ? '/teacher/dashboard' : user.role === 'parent' ? '/parent/dashboard' : '/student/dashboard';
                window.location.replace(next);
            } catch (_) {
                localStorage.removeItem('token');
            }
        })();
    </script>
    <script src="/static/js/register.js"></script>
</body>
</html>
