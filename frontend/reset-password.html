<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сбросить пароль</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #000;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
  }

  .bg { position: fixed; inset: 0; z-index: 0; }

  .bg-v2 {
    position: absolute;
    left: -5.26%; right: 5.31%; top: 39.44%; bottom: -3.06%;
    background: radial-gradient(112.67% 112.67% at 41.02% 100%,
      rgba(255,255,255,0.93) 11.3%, rgba(208,201,250,0.77) 25.06%,
      rgba(101,77,253,0.77) 36.98%, rgba(36,0,255,0.77) 49.38%,
      rgba(12,0,84,0.877) 71.87%, #02000F 88.54%);
    filter: blur(14.6px);
    opacity: 0.7;
  }

  .bg-v3 {
    position: absolute;
    left: -1.98%; right: 8.96%; top: 34.26%; bottom: 2.13%;
    background: radial-gradient(112.67% 112.67% at 41.02% 100%,
      rgba(255,255,255,0.651) 11.3%, rgba(208,201,250,0.539) 25.06%,
      rgba(101,77,253,0.539) 36.98%, rgba(36,0,255,0.539) 49.38%,
      rgba(12,0,84,0.614) 71.88%, rgba(2,0,15,0.7) 88.54%);
    mix-blend-mode: lighten;
    filter: blur(204px);
  }

  .page {
    position: relative; z-index: 1;
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }

  .card {
    width: min(860px, 92vw);
    background: rgba(255,255,255,0.14);
    box-shadow: inset 0px 2px 4px rgba(255,255,255,0.16);
    backdrop-filter: blur(50px);
    -webkit-backdrop-filter: blur(50px);
    border-radius: 20px;
    padding: 72px 60px 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .title {
    font-weight: 700;
    font-size: clamp(32px, 4vw, 62px);
    color: #fff;
    text-align: center;
    margin-bottom: 12px;
  }

  .subtitle {
    font-size: 19px; font-weight: 400;
    color: #fff;
    text-align: center;
    margin-bottom: 40px;
  }

  .field { width: 100%; margin-bottom: 24px; }

  .field-label {
    font-size: 19px; font-weight: 600;
    color: #fff;
    margin-bottom: 8px;
    display: block;
  }

  .field-input {
    width: 100%; height: 50px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.8);
    border-radius: 15px;
    padding: 0 18px;
    font-size: 19px; font-weight: 400;
    color: #fff;
    font-family: 'Nunito', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }

  .field-input::placeholder { color: rgba(255,255,255,0.5); }
  .field-input:focus { border-color: #999CFF; }

  .btn-reset {
    width: 100%; height: 50px;
    background: rgba(153,156,255,0.8);
    border: none; border-radius: 15px;
    font-size: 24px; font-weight: 700;
    color: #fff; font-family: 'Nunito', sans-serif;
    cursor: pointer;
    filter: drop-shadow(0px 12px 14px rgba(0,0,0,0.35));
    transition: opacity 0.2s;
  }

  .btn-reset:hover { opacity: 0.88; }
  .btn-reset:disabled { opacity: 0.5; cursor: not-allowed; }

  .msg {
    display: none;
    width: 100%;
    padding: 10px 16px;
    border-radius: 10px;
    font-size: 15px;
    text-align: center;
    margin-bottom: 16px;
  }
  .msg.error { background: rgba(220,38,38,0.25); color: #fca5a5; }
  .msg.success { background: rgba(5,150,105,0.25); color: #6ee7b7; }
</style>
</head>
<body>

<div class="bg">
  <div class="bg-v2"></div>
  <div class="bg-v3"></div>
</div>

<div class="page">
  <div class="card">
    <h1 class="title">Сбросить пароль</h1>
    <p class="subtitle">Введите почту от аккаунта для сброса</p>

    <div class="msg" id="msg"></div>

    <div class="field">
      <label class="field-label">Электронная почта</label>
      <input class="field-input" type="email" id="email" placeholder="Введите свою почту">
    </div>

    <button class="btn-reset" id="btn">Отправить ссылку для сброса</button>
  </div>
</div>

</body>
<script>
const API = window.location.origin;

document.getElementById('btn').addEventListener('click', async () => {
  const email = document.getElementById('email').value.trim();
  const btn = document.getElementById('btn');
  const msg = document.getElementById('msg');
  msg.style.display = 'none';

  if (!email) {
    msg.textContent = 'Введите email'; msg.className = 'msg error'; msg.style.display = 'block'; return;
  }

  btn.disabled = true; btn.textContent = 'Отправляю...';
  try {
    const res = await fetch(API + '/api/users/password-reset/request', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email }),
    });
    const data = await res.json();
    if (!res.ok) throw data.detail;

    msg.textContent = 'Если такой email зарегистрирован, ссылка отправлена на почту.';
    msg.className = 'msg success'; msg.style.display = 'block';
    btn.textContent = 'Отправлено';

    // В dev-режиме токен возвращается в ответе
    if (data.dev_link) {
      console.log('[DEV] Reset link:', data.dev_link);
      msg.textContent += ' (DEV: ссылка в консоли)';
    }
  } catch (e) {
    msg.textContent = typeof e === 'string' ? e : 'Ошибка. Попробуйте позже.';
    msg.className = 'msg error'; msg.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Отправить ссылку для сброса';
  }
});

document.getElementById('email').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btn').click();
});
</script>
</html>
