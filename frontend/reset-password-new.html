<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Новый пароль</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #000;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
  }

  .bg { position: fixed; inset: 0; z-index: 0; }

  .bg-v2 {
    position: absolute;
    left: -5.26%; right: 5.31%; top: 39.44%; bottom: -3.06%;
    background: radial-gradient(112.67% 112.67% at 41.02% 100%,
      rgba(255,255,255,0.93) 11.3%, rgba(208,201,250,0.77) 25.06%,
      rgba(101,77,253,0.77) 36.98%, rgba(36,0,255,0.77) 49.38%,
      rgba(12,0,84,0.877) 71.87%, #02000F 88.54%);
    filter: blur(14.6px);
    opacity: 0.7;
  }

  .bg-v3 {
    position: absolute;
    left: -1.98%; right: 8.96%; top: 34.26%; bottom: 2.13%;
    background: radial-gradient(112.67% 112.67% at 41.02% 100%,
      rgba(255,255,255,0.651) 11.3%, rgba(208,201,250,0.539) 25.06%,
      rgba(101,77,253,0.539) 36.98%, rgba(36,0,255,0.539) 49.38%,
      rgba(12,0,84,0.614) 71.88%, rgba(2,0,15,0.7) 88.54%);
    mix-blend-mode: lighten;
    filter: blur(204px);
  }

  .page {
    position: relative; z-index: 1;
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }

  .card {
    width: min(860px, 92vw);
    background: rgba(255,255,255,0.14);
    box-shadow: inset 0px 2px 4px rgba(255,255,255,0.16);
    backdrop-filter: blur(50px);
    -webkit-backdrop-filter: blur(50px);
    border-radius: 20px;
    padding: 72px 60px 72px;
  }

  .title {
    font-weight: 700;
    font-size: clamp(32px, 4vw, 62px);
    color: #fff;
    text-align: center;
    margin-bottom: 40px;
  }

  .field { margin-bottom: 20px; }

  .field-label {
    display: block;
    font-size: 19px; font-weight: 600;
    color: #fff;
    margin-bottom: 8px;
  }

  .field-input {
    width: 100%; height: 50px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.8);
    border-radius: 15px;
    padding: 0 18px;
    font-size: 19px; font-weight: 400;
    color: #fff;
    font-family: 'Nunito', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }

  .field-input::placeholder { color: rgba(255,255,255,0.5); }
  .field-input:focus { border-color: #999CFF; }

  .btn-submit {
    width: 100%; height: 50px;
    background: rgba(153,156,255,0.8);
    border: none; border-radius: 15px;
    font-size: 26px; font-weight: 700;
    color: #fff; font-family: 'Nunito', sans-serif;
    cursor: pointer; margin-top: 14px;
    filter: drop-shadow(0px 12px 14px rgba(0,0,0,0.35));
    transition: opacity 0.2s;
  }

  .btn-submit:hover { opacity: 0.88; }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

  .msg {
    display: none;
    padding: 10px 16px;
    border-radius: 10px;
    font-size: 15px;
    text-align: center;
    margin-bottom: 16px;
  }
  .msg.error { background: rgba(220,38,38,0.25); color: #fca5a5; }
  .msg.success { background: rgba(5,150,105,0.25); color: #6ee7b7; }

  .token-invalid {
    display: none;
    text-align: center;
    color: rgba(255,255,255,0.7);
    font-size: 16px;
    padding: 20px 0;
  }
</style>
</head>
<body>

<div class="bg">
  <div class="bg-v2"></div>
  <div class="bg-v3"></div>
</div>

<div class="page">
  <div class="card">
    <h1 class="title">Введите новый пароль</h1>

    <div class="msg" id="msg"></div>
    <div class="token-invalid" id="tokenInvalid">
      Ссылка недействительна или устарела.<br>
      <a href="reset-password" style="color:#999CFF;font-weight:700">Запросить новую</a>
    </div>

    <div id="form">
      <div class="field">
        <label class="field-label">Новый пароль</label>
        <input class="field-input" type="password" id="password" placeholder="Введите новый пароль">
      </div>

      <div class="field">
        <label class="field-label">Подтвердите пароль</label>
        <input class="field-input" type="password" id="confirm" placeholder="Подтвердите новый пароль">
      </div>

      <button class="btn-submit" id="btn">Сменить пароль</button>
    </div>
  </div>
</div>

</body>
<script>
const API = window.location.origin;

const params = new URLSearchParams(window.location.search);
const token = params.get('token');

if (!token) {
  document.getElementById('form').style.display = 'none';
  document.getElementById('tokenInvalid').style.display = 'block';
}

document.getElementById('btn').addEventListener('click', async () => {
  const password = document.getElementById('password').value;
  const confirm  = document.getElementById('confirm').value;
  const btn = document.getElementById('btn');
  const msg = document.getElementById('msg');
  msg.style.display = 'none';

  if (!password || !confirm) {
    msg.textContent = 'Заполните оба поля'; msg.className = 'msg error'; msg.style.display = 'block'; return;
  }
  if (password.length < 8) {
    msg.textContent = 'Пароль минимум 8 символов'; msg.className = 'msg error'; msg.style.display = 'block'; return;
  }
  if (password !== confirm) {
    msg.textContent = 'Пароли не совпадают'; msg.className = 'msg error'; msg.style.display = 'block'; return;
  }

  btn.disabled = true; btn.textContent = 'Сохраняю...';
  try {
    const res = await fetch(API + '/api/users/password-reset/confirm', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, new_password: password }),
    });
    const data = await res.json();
    if (!res.ok) throw data.detail;

    msg.textContent = 'Пароль успешно изменён. Перенаправляю...';
    msg.className = 'msg success'; msg.style.display = 'block';
    document.getElementById('form').style.opacity = '0.4';

    setTimeout(() => window.location.href = 'login', 2000);
  } catch (e) {
    const text = typeof e === 'string' ? e : 'Ошибка. Возможно, ссылка устарела.';
    msg.textContent = text; msg.className = 'msg error'; msg.style.display = 'block';

    if (text.includes('expired') || text.includes('Invalid')) {
      document.getElementById('form').style.display = 'none';
      document.getElementById('tokenInvalid').style.display = 'block';
    }
    btn.disabled = false; btn.textContent = 'Сменить пароль';
  }
});
</script>
</html>
