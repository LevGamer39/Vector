<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои задачи — Вектор</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/student/css/dashboard.css">
    <link rel="stylesheet" href="/static/student/css/tasks.css">
</head>
<body>

    <div class="bg">
        <img src="/static/student/images/fon.svg" alt="">
        <div class="bg-light-2b"></div>
    </div>

    <div class="layout">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div class="sidebar-logo-text">
                    <span class="sidebar-logo-title">Вектор</span>
                    <span class="sidebar-logo-sub">Личный помощник с задачами</span>
                </div>
            </div>
            <div class="sidebar-divider"></div>
            <nav class="sidebar-nav">
                <a href="/student/dashboard" class="nav-item">
                    <img src="/static/student/images/home.svg" alt="">
                    <span class="nav-label">Главный экран</span>
                </a>
                <a href="/student/tasks" class="nav-item">
                    <img src="/static/student/images/task.svg" alt="">
                    <span class="nav-label">Мои задачи</span>
                </a>
                <a href="/student/calendar" class="nav-item">
                    <img src="/static/student/images/calendar.svg" alt="">
                    <span class="nav-label">Календарь</span>
                </a>
                <a href="/student/progress" class="nav-item">
                    <img src="/static/student/images/usp.svg" alt="">
                    <span class="nav-label">Успеваемость</span>
                </a>
                <a href="/student/ai" class="nav-item">
                    <img src="/static/student/images/ai.svg" alt="">
                    <span class="nav-label">ИИ-ассистент</span>
                </a>
            </nav>
            <div class="sidebar-bottom">
                <a href="/settings" class="nav-item nav-item-settings">
                    <img src="/static/student/images/settings.svg" alt="">
                    <span class="nav-label">Настройки</span>
                </a>
            </div>
        </aside>

        <!-- MAIN -->
        <div class="main-wrap">
            <main class="main tasks-main">

                <!-- TOPBAR -->
                <div class="topbar">
                    <div class="topbar-greeting"></div>
                    <div class="topbar-right">
                        <div class="notif-wrap" onclick="toggleNotifications(event)">
                            <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                                <path d="M14 3C14 3 7 6 7 14v5l-2 2v1h18v-1l-2-2v-5c0-8-7-11-7-11z" stroke="rgba(255,255,255,0.6)" stroke-width="1.8" stroke-linejoin="round"/>
                                <path d="M11.5 23a2.5 2.5 0 0 0 5 0" stroke="rgba(255,255,255,0.6)" stroke-width="1.8"/>
                            </svg>
                            <div id="notifCounter" class="notif-dot" style="display:none;">0</div>
                            <div id="notifModal" class="notif-modal" style="display:none;">
                                <h2 class="notif-title">Уведомления:</h2>
                                <div class="notif-scroll-area" id="notifList"></div>
                            </div>
                        </div>
                        <div class="avatar">??</div>
                    </div>
                </div>

                <!-- TASKS PAGE CONTENT -->
                <div class="tasks-page">

                    <!-- LEFT: list -->
                    <div class="tasks-list-wrap">
                        <div class="tasks-page-header">
                            <h1 class="tasks-page-title">Мои задачи:</h1>
                            <div class="tasks-filters">
                                <button class="filter-tab filter-tab--active" data-filter="all"        onclick="setFilter('all')">Все</button>
                                <button class="filter-tab" data-filter="pending"     onclick="setFilter('pending')">Не начато</button>
                                <button class="filter-tab" data-filter="in_progress" onclick="setFilter('in_progress')">В работе</button>
                                <button class="filter-tab" data-filter="done"        onclick="setFilter('done')">Завершено</button>
                            </div>
                        </div>

                        <div class="tasks-scroll-area">
                            <div id="tasksList" class="tasks-list-inner">
                                <!-- rows rendered by JS -->
                            </div>
                        </div>
                    </div>

                    <!-- RIGHT: detail panel -->
                    <div id="detailPanel" class="detail-panel">
                        <!-- rendered by JS when task is selected -->
                    </div>

                </div>

            </main>
        </div>
    </div>

    <!-- Status context menu -->
    <div id="statusMenu" class="status-context-menu" style="display:none;">
        <div onclick="updateTaskStatus('pending')">
            <span style="width:8px;height:8px;border-radius:50%;background:#9ca3af;display:inline-block;margin-right:8px"></span>
            Не начато
        </div>
        <div onclick="updateTaskStatus('in_progress')">
            <span style="width:8px;height:8px;border-radius:50%;background:#FFC96B;display:inline-block;margin-right:8px"></span>
            В работе
        </div>
        <div onclick="updateTaskStatus('done')">
            <span style="width:8px;height:8px;border-radius:50%;background:#83FFB7;display:inline-block;margin-right:8px"></span>
            Завершено
        </div>
    </div>

    <script src="/static/student/js/tasks.js"></script>
</body>
</html>
