<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Календарь</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon/favicon.svg">
    <link rel="icon" type="image/x-icon" href="/static/favicon/favicon.ico">
    <link rel="apple-touch-icon" href="/static/favicon/apple-touch-icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/student/css/dashboard.css">
    <link rel="stylesheet" href="/static/student/css/calendar.css">
</head>
<body>
    <div class="bg">
        <img src="/static/student/images/fon.svg" alt="">
        <div class="bg-light-2b"></div>
    </div>

    <div class="layout">
        <button class="mobile-nav-toggle" type="button" aria-label="Открыть меню" aria-expanded="false" data-mobile-nav-toggle>
            <span></span>
            <span></span>
            <span></span>
        </button>
        <div class="sidebar-overlay"></div>
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div class="sidebar-logo-text">
                    <span class="sidebar-logo-title">Вектор</span>
                    <span class="sidebar-logo-sub">Личный помощник с задачами</span>
                </div>
            </div>

            <div class="sidebar-divider"></div>

            <nav class="sidebar-nav">
                <a href="/student/dashboard" class="nav-item">
                    <img src="/static/student/images/home.svg" alt="">
                    <span class="nav-label">Главный экран</span>
                </a>

                <a href="/student/tasks" class="nav-item">
                    <img src="/static/student/images/task.svg" alt="">
                    <span class="nav-label">Мои задачи</span>
                </a>

                <a href="/student/calendar" class="nav-item">
                    <img src="/static/student/images/calendar.svg" alt="">
                    <span class="nav-label">Календарь</span>
                </a>

                <a href="/student/progress" class="nav-item">
                    <img src="/static/student/images/usp.svg" alt="">
                    <span class="nav-label">Успеваемость</span>
                </a>

                <a href="/student/ai" class="nav-item">
                    <img src="/static/student/images/ai.svg" alt="">
                    <span class="nav-label">ИИ-ассистент</span>
                </a>
            </nav>

            <div class="sidebar-bottom">
                <a href="/student/settings" class="nav-item nav-item-settings">
                    <img src="/static/student/images/settings.svg" alt="">
                    <span class="nav-label">Настройки</span>
                </a>
            </div>
        </aside>

        <div class="main-wrap">
            <main class="main calendar-main">
                <div class="topbar calendar-topbar">
                    <div class="calendar-month-switcher">
                        <button class="month-side month-side--muted" id="prevMonthBtn" type="button"></button>
                        <button class="month-current" id="currentMonthBtn" type="button">
                            <span id="currentMonthLabel"></span>
                            <svg viewBox="0 0 24 24" fill="none" width="26" height="26">
                                <path d="M5 9l7 7 7-7" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"></path>
                            </svg>
                        </button>
                        <button class="month-side month-side--muted" id="nextMonthBtn" type="button"></button>
                    </div>

                    <div class="topbar-right">
                        <div class="streak-badge">
                            <img src="/static/student/images/strike.svg" alt="">
                            <span class="streak-count" id="streakCount">0</span>
                        </div>

                        <div class="notif-wrap" onclick="toggleNotifications(event)">
                            <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                                <path d="M14 3C14 3 7 6 7 14v5l-2 2v1h18v-1l-2-2v-5c0-8-7-11-7-11z" stroke="rgba(255,255,255,0.7)" stroke-width="1.8" stroke-linejoin="round"></path>
                                <path d="M11.5 23a2.5 2.5 0 0 0 5 0" stroke="rgba(255,255,255,0.7)" stroke-width="1.8"></path>
                            </svg>
                            <div id="notifCounter" class="notif-dot" style="display:none;">0</div>
                            <div id="notifModal" class="notif-modal" style="display:none;">
                                <h2 class="notif-title">Уведомления:</h2>
                                <div class="notif-scroll-area" id="notifList"></div>
                            </div>
                        </div>

                        <div class="avatar">??</div>
                    </div>
                </div>

                <section class="calendar-shell">
                    <div class="calendar-board">
                        <div class="calendar-grid" id="calendarGrid"></div>
                        <div class="calendar-weeks" id="calendarWeeks"></div>
                        <aside class="calendar-detail" id="calendarDetail"></aside>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <script src="/static/js/mobile-nav.js"></script>
    <script src="/static/student/js/calendar.js"></script>
</body>
</html>
